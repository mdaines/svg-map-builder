<h1>SVG Map Builder</h1>

<p>Build SVG maps from GeoJSON or vector tile data.</p>

<p><a href="http://github.com/mdaines/svg-map-builder">GitHub</a></p>

<h2>Example: Old Tokaido</h2>

<p>This example uses a GeoJSON dataset and an extract of the <a href="https://docs.protomaps.com/basemaps/downloads">Protomaps Basemap</a>.</p>

<p class="map">
  <img src="./map.svg">
</p>

<p>Map data from <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>.</p>
