<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="./styles/main.css">
</head>
<body>

  <div id="app">
    <div id="map">
      <div id="image">
      </div>
      
      <div id="credit">
        Map data from <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>
      </div>
    </div>
    
    <div id="options">
      <fieldset>
        <legend>Layers</legend>
        
        <label>
          <input type="checkbox" name="visibleLayers.landcover" checked>
          Landcover
        </label>
        
        <label>
          <input type="checkbox" name="visibleLayers.water" checked>
          Water
        </label>
        
        <label>
          <input type="checkbox" name="visibleLayers.roads" checked>
          Roads
        </label>
        
        <label>
          <input type="checkbox" name="visibleLayers.boundaries" checked>
          Boundaries
        </label>
        
        <label>
          <input type="checkbox" name="visibleLayers.route" checked>
          Route
        </label>
        
        <label>
          <input type="checkbox" name="visibleLayers.places" checked>
          Places
        </label>
      </fieldset>

      <fieldset>
        <legend>Markers</legend>
        
        <label>
          <input type="checkbox" name="markers.removeOverlap" checked>
          Remove Overlapping Markers
        </label>

        <label>
          <input type="checkbox" name="markers.showDebugRects">
          Show Debug Rects
        </label>
      </fieldset>
    </div>
  </div>

  <script type="module" src="./index.js"></script>
  
</body>
</html>
